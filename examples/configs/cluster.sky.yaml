resources:
  ordered:

    # Prefer inexpensive options on Lambda up to 2xH100s
    - infra: lambda
      accelerators: A10
    - infra: lambda
      accelerators: A100
    - infra: lambda
      accelerators: A100-80GB
    - infra: lambda
      accelerators: H100
    - infra: lambda
      accelerators: A100:2
    - infra: lambda
      accelerators: H100:2

    # Cheapest compatiable options on AWS and GCP:
    # - infra: aws
    #   accelerators: A10G
    #   instance_type: g5.8xlarge
    # - infra: gcp
    #   accelerators: L4
    #   instance_type: g2-standard-32

  disk_size: 100
workdir: .
setup: |
  # Install uv package manager on standard cloud instances
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.cargo/env || source $HOME/.local/bin/env
  export PATH="$HOME/.local/bin:$PATH"
  
  # Install environment and dependencies
  uv sync --extra torch --extra mamba
