name: Update Hugging Face Downloads Badge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Update badge Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          import urllib.error

          def fetch_with_retry(url, headers=None, retries=4, base_delay=15):
              for attempt in range(retries):
                  req = urllib.request.Request(url, headers=headers or {})
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.load(r)
                  except urllib.error.HTTPError as e:
                      if e.code == 429:
                          if attempt < retries - 1:
                              delay = base_delay * (2 ** attempt)
                              print(f"Rate limited (attempt {attempt+1}/{retries}). Retrying in {delay}s...")
                              time.sleep(delay)
                          else:
                              print("Rate limited after all retries. Skipping update.")
                              raise SystemExit(0)
                      else:
                          raise

          models = [
              "plantcad/genecad_plant",
              "plantcad/genecad_animal",
          ]

          hf_headers = {}
          if os.environ.get("HF_TOKEN"):
              hf_headers["Authorization"] = f"Bearer {os.environ['HF_TOKEN']}"

          total = 0
          details = {}
          for model in models:
              url = f"https://huggingface.co/api/models/{model}"
              payload = fetch_with_retry(url, headers=hf_headers)
              downloads = int(payload.get("downloads") or 0)
              details[model] = downloads
              total += downloads

          badge = {
              "schemaVersion": 1,
              "label": "HF downloads",
              "message": f"{total:,}",
              "color": "yellow",
              "namedLogo": "huggingface",
              "cacheSeconds": 21600,
          }

          print("Combined Hugging Face downloads:")
          for model, downloads in details.items():
              print(f"  {model}: {downloads:,}")
          print(f"  Total: {total:,}")

          gist_token = os.environ["GIST_TOKEN"]
          gist_id = os.environ["GIST_ID"]
          body = json.dumps({
              "files": {
                  "hf-downloads.json": {
                      "content": json.dumps(badge, indent=2) + "\n"
                  }
              }
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              data=body,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {gist_token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              print(f"Gist updated: {json.load(r)['html_url']}")
          PY
