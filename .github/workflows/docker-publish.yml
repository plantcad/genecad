name: Build and Publish Docker Image

on:
  # Triggers the workflow when you push to the main branch
  push:
    branches: [ "main", "master" ]
    # Also trigger when you create a version tag (e.g., v1.0.0)
    tags: [ 'v*.*.*' ]
  # Allows you to run this workflow manually from the GitHub website
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # We use a new name to bypass permission locks on the legacy 'genecad' package
  IMAGE_NAME: plantcad/genecad_v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # These permissions allow GitHub to publish the image to your repository's packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        # Login to GitHub Container Registry using the automatic GitHub token
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Automatically tag the image with 'latest' on main branch
          # track version tags if you create GitHub Releases,
          # and also attach the branch name if building a non-main branch.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # This enables layer caching, which makes subsequent builds MUCH faster
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

